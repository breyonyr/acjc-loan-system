<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - ACJC Equipment Loans</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f7fc;
      color: #1a1530;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1530; color: #e8e6f0; }
      .card { background: #231f3a; border-color: #352f52; }
      .subtitle { color: #9890b0; }
      .btn { background: #7c5cfc; color: #1a1530; }
      .btn:hover { background: #6b4ce6; }
      .icon-circle { background: #2a2545; }
      .icon-circle svg { color: #7c5cfc; }
    }
    .container { max-width: 400px; text-align: center; }
    .icon-circle {
      width: 64px; height: 64px; border-radius: 50%;
      background: #ede8ff; display: flex; align-items: center;
      justify-content: center; margin: 0 auto 1.5rem;
    }
    .icon-circle svg { width: 28px; height: 28px; color: #5b3fd9; }
    h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.01em; }
    .subtitle {
      margin-top: 0.5rem; font-size: 0.875rem; color: #6b6580;
      line-height: 1.6;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      margin-top: 1.5rem; height: 36px; padding: 0 1rem;
      border-radius: 8px; border: none; cursor: pointer;
      font-size: 0.875rem; font-weight: 500;
      background: #5b3fd9; color: #fff; transition: background 0.2s;
    }
    .btn:hover { background: #4a30c4; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-circle">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" x2="23" y1="1" y2="23" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" x2="12.01" y1="20" y2="20" />
      </svg>
    </div>
    <h1>You&rsquo;re offline</h1>
    <p class="subtitle">
      It looks like you&rsquo;ve lost your internet connection. Check your Wi-Fi or mobile data and try again.
    </p>
    <button class="btn" onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
